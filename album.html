<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album 2026</title>
    <link rel="stylesheet" href="css/album.css">
</head>
<body>

<a href="index.html" class="back-btn">Accueil</a>

<section class="album-wrapper">
    <div class="book">

        <div class="page page-left">

            <div class="team-header">
                <h1 id="team-name">France</h1>
            </div>

            <div class="stickers-grid left-grid" id="left-grid"></div>

        </div>

        <div class="page page-right">

            <div class="stickers-grid right-grid" id="right-grid"></div>

        </div>

    </div>
</section>

<nav class="album-nav">

    <button id="prev-team">←</button>

    <button id="team-selector">
        <img id="nav-flag" src="images/france.png" alt="Écusson">
        <span id="nav-team">France</span>
    </button>

    <button id="next-team">→</button>

</nav>

<div class="country-menu" id="country-menu"></div>

<script src="js/album.js"></script>

</body>
</html>
